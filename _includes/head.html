{%- assign favicon_url = ("/favicon.svg" | relative_url) | append: "?v=" | append: site.time | date: '%s' -%}
{%- assign png_fallback = ("/assets/DIGISCHOLI_color-flush.png" | relative_url) -%}
<link rel="icon" type="image/svg+xml" href="{{ favicon_url }}">
<link rel="icon" type="image/png" href="{{ png_fallback }}">
<link rel="shortcut icon" href="{{ favicon_url }}">
<link rel="apple-touch-icon" href="{{ png_fallback }}">
<link rel="stylesheet" href="{{ '/assets/css/override.css' | relative_url | append: '?v=' | append: site.time | date: '%s' }}">
<script>
  (function() {
    var setIcon = function(url) {
      ['icon', 'shortcut icon', 'apple-touch-icon'].forEach(function(rel) {
        var link = document.querySelector('link[rel="' + rel + '"]');
        if (link) { link.href = url; }
        else {
          link = document.createElement('link');
          link.rel = rel;
          link.href = url;
          document.head.appendChild(link);
        }
      });
    };
    setIcon("{{ favicon_url }}");

    var logoUrl = "{{ '/assets/DIGISCHOLI_color-flush.png' | relative_url }}";
    var altText = "DIGISCHOLI wordmark";

    function createAndInsertWordmark(container) {
      if (!container || container.querySelector('.unit-wordmark')) return;

      var titleEl = container.querySelector('.site-title') || container.querySelector('.site-header');
      var logo = document.createElement('img');
      logo.src = logoUrl;
      logo.alt = altText;
      logo.className = 'unit-wordmark';
      logo.setAttribute('role', 'img');

      var ack = document.createElement('p');
      ack.className = 'just-the-docs-ack';
      ack.innerHTML = 'This site uses <a href="https://pmarsceill.github.io/just-the-docs/" target="_blank" rel="noopener noreferrer">Just the Docs</a>, a documentation theme for Jekyll.';

      if (titleEl) {
        titleEl.insertAdjacentElement('afterend', logo);
        titleEl.insertAdjacentElement('afterend', ack);
        return;
      }

      container.insertAdjacentElement('afterbegin', logo);
      container.insertAdjacentElement('afterbegin', ack);
    }

    var selectors = [
      '.sidebar-nav .site-header',
      '.sidebar-nav .site-title',
      '.site-header',
      '.site-title'
    ];

    function tryInsert() {
      var container = document.querySelector('.sidebar-nav') || document.querySelector('.site-sidebar');
      if (container && !container.querySelector('.unit-wordmark')) {
        createAndInsertWordmark(container);
        return true;
      }

      for (var i = 0; i < selectors.length; i++) {
        var el = document.querySelector(selectors[i]);
        if (el) {
          createAndInsertWordmark(el.parentNode || el);
          return true;
        }
      }
      return false;
    }

    if (!tryInsert()) {
      var observer = new MutationObserver(function(mutations, obs) {
        if (tryInsert()) {
          obs.disconnect();
        }
      });
      observer.observe(document.documentElement || document.body, { childList: true, subtree: true });
    }
  })();
</script>
