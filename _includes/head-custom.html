<style>
  /* UW-Madison Accessible Color Scheme Override */
  :root {
    /* UW-Madison brand colors */
    --uw-cardinal: #C5050C;
    --uw-charcoal: #333333;
    --uw-light-gray: #F0F0F0;
    --uw-white: #FFFFFF;
  }

  /* Override just-the-docs color variables */
  html {
    --color-text-primary: var(--uw-charcoal);
    --color-link: var(--uw-cardinal);
    --color-link-visited: #992608;
    --color-bg-primary: var(--uw-white);
    --color-bg-secondary: var(--uw-light-gray);
  }

  /* Sidebar background */
  .side-bar {
    background-color: var(--uw-light-gray) !important;
  }

  /* Sidebar nav links */
  .nav-list .nav-list-item > .nav-list-link {
    color: var(--uw-charcoal);
  }

  /* Active nav item with cardinal accent */
  .nav-list .nav-list-item.active > .nav-list-link {
    color: var(--uw-cardinal);
    border-left: 4px solid var(--uw-cardinal);
  }

  /* Links throughout the site */
  a {
    color: var(--uw-cardinal);
  }

  a:visited {
    color: #992608;
  }

  a:hover {
    text-decoration: underline;
  }

  a:focus {
    outline: 2px solid var(--uw-cardinal);
    outline-offset: 2px;
  }

  /* Button styling */
  .btn {
    background-color: var(--uw-cardinal) !important;
    color: var(--uw-white);
  }

  .btn:hover {
    background-color: #a00409 !important;
  }

  /* Code blocks with cardinal left accent */
  pre {
    background-color: var(--uw-light-gray);
    border-left: 4px solid var(--uw-cardinal);
  }

  code {
    background-color: var(--uw-light-gray);
    color: var(--uw-charcoal);
  }

  /* Blockquotes with cardinal accent */
  blockquote {
    border-left: 4px solid var(--uw-cardinal);
    padding-left: 1rem;
  }

  /* Main text */
  body {
    color: var(--uw-charcoal) !important;
  }

  h1, h2, h3, h4, h5, h6 {
    color: var(--uw-charcoal) !important;
  }

  /* Table styling */
  table thead {
    background-color: var(--uw-light-gray);
    border-bottom: 2px solid var(--uw-cardinal);
  }

  table th {
    color: var(--uw-charcoal);
  }

  /* Search button */
  .search-button {
    background-color: var(--uw-cardinal);
    color: var(--uw-white);
  }
</style>
