{%- assign favicon_url = ("/favicon.svg" | relative_url) | append: "?v=" | append: site.time | date: '%s' -%}
{%- assign png_fallback = ("/assets/DIGISCHOLI_color-flush.png" | relative_url) -%}
<link rel="icon" type="image/svg+xml" href="{{ favicon_url }}">
<link rel="icon" type="image/png" href="{{ png_fallback }}">
<link rel="shortcut icon" href="{{ favicon_url }}">
<link rel="apple-touch-icon" href="{{ png_fallback }}">
<link rel="stylesheet" href="{{ '/assets/css/override.css' | relative_url | append: '?v=' | append: site.time | date: '%s' }}">
<script>
  (function() {
    var setIcon = function(url) {
      ['icon', 'shortcut icon', 'apple-touch-icon'].forEach(function(rel) {
        var link = document.querySelector('link[rel="' + rel + '"]');
        if (link) { link.href = url; }
        else {
          link = document.createElement('link');
          link.rel = rel;
          link.href = url;
          document.head.appendChild(link);
        }
      });
    };
    setIcon("{{ favicon_url }}");

    // Insert unit wordmark/logo under the site title in the sidebar.
    // Use a MutationObserver to wait for the theme to render the sidebar.
    var logoUrl = "{{ '/assets/DIGISCHOLI_color-flush.png' | relative_url }}";
    var altText = "DIGISCHOLI wordmark";

    function createAndInsertWordmark(container) {
      if (!container || container.querySelector('.unit-wordmark')) return;
      var img = document.createElement('img');
      img.src = logoUrl;
      img.alt = altText;
      img.className = 'unit-wordmark';
      img.setAttribute('role', 'img');
      container.appendChild(img);
    }

    // Candidate selectors used by just-the-docs theme for the sidebar header
    var selectors = [
      '.sidebar-nav .site-header',
      '.sidebar-nav .site-title',
      '.site-header',
      '.site-title'
    ];

    function tryInsert() {
      for (var i = 0; i < selectors.length; i++) {
        var el = document.querySelector(selectors[i]);
        if (el) {
          createAndInsertWordmark(el);
          return true;
        }
      }
      return false;
    }

    if (!tryInsert()) {
      var observer = new MutationObserver(function(mutations, obs) {
        if (tryInsert()) {
          obs.disconnect();
        }
      });
      observer.observe(document.documentElement || document.body, { childList: true, subtree: true });
    }
  })();
</script>
