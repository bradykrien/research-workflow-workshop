{%- assign favicon_url = ("/favicon.svg" | relative_url) | append: "?v=" | append: site.time | date: '%s' -%}
<link rel="icon" type="image/svg+xml" href="{{ favicon_url }}">
<link rel="shortcut icon" href="{{ favicon_url }}">
<link rel="apple-touch-icon" href="{{ favicon_url }}">
<link rel="stylesheet" href="{{ '/assets/css/override.css' | relative_url }}">
<script>
  (function() {
    var setIcon = function(url) {
      ['icon', 'shortcut icon', 'apple-touch-icon'].forEach(function(rel) {
        var link = document.querySelector('link[rel="' + rel + '"]');
        if (link) { link.href = url; }
        else {
          link = document.createElement('link');
          link.rel = rel;
          link.href = url;
          document.head.appendChild(link);
        }
      });
    };
    setIcon("{{ favicon_url }}");

    // Insert unit wordmark/logo under the site title in the sidebar
    var insertWordmark = function() {
      var logoUrl = "{{ '/assets/DIGISCHOLI_color-flush.png' | relative_url }}";
      var altText = "Unit wordmark";

      // Try a few selectors for different theme versions
      var header = document.querySelector('.sidebar-nav .site-title') ||
                   document.querySelector('.sidebar-nav .site-header') ||
                   document.querySelector('.site-header') ||
                   document.querySelector('.site-title');
      if (!header) return;

      // Don't add if already present
      if (header.querySelector('.unit-wordmark')) return;

      var img = document.createElement('img');
      img.src = logoUrl;
      img.alt = altText;
      img.className = 'unit-wordmark';
      img.setAttribute('role', 'img');

      // Insert after the site title text
      header.appendChild(img);
    };

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', insertWordmark);
    } else {
      insertWordmark();
    }
  })();
</script>
